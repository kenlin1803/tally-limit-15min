<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tally 驗證登入</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 56px;
      background: #111827;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 14px;
    }

    .title {
      font-weight: 700;
    }

    .timer {
      font-weight: 700;
      font-size: 16px;
    }

    .notice {
      background: #fff7ed;
      color: #9a3412;
      padding: 10px 16px;
      border-bottom: 1px solid #fed7aa;
      font-size: 14px;
    }

    .center-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .card h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    .card p {
      margin: 0 0 16px;
      color: #4b5563;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: 0;
      background: #111827;
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    button.secondary {
      background: #374151;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 14px;
      font-size: 14px;
      line-height: 1.5;
      color: #1f2937;
      white-space: pre-wrap;
    }

    .hidden {
      display: none !important;
    }

    .form-wrap {
      width: 100%;
      height: calc(100vh - 96px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: white;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.78);
      z-index: 9999;
      padding: 24px;
    }

    .overlay-box {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .overlay-box h2 {
      margin: 0 0 12px;
      font-size: 28px;
      color: #b91c1c;
    }

    .overlay-box p {
      margin: 8px 0;
      line-height: 1.7;
      color: #374151;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title">Tally 表單頁面</div>
      <div class="timer">剩餘時間：<span id="countdown">--:--</span></div>
    </div>

    <div class="notice">
      需先完成 Email 驗證。驗證成功後可使用 15 分鐘，剩餘 1 分鐘時會自動提醒。
    </div>

    <div class="center-wrap" id="authScreen">
      <div class="card">
        <h1>驗證後進入表單</h1>
        <p>請先輸入 Email，取得驗證碼後再進入表單頁面。</p>

        <div class="field">
          <label for="emailInput">Email</label>
          <input id="emailInput" type="email" placeholder="請輸入 Email" />
        </div>

        <div class="btn-row">
          <button id="sendOtpBtn" type="button">發送驗證碼</button>
        </div>

        <div class="field" style="margin-top: 18px;">
          <label for="otpInput">驗證碼</label>
          <input id="otpInput" type="text" placeholder="請輸入 6 碼驗證碼" />
        </div>

        <div class="btn-row">
          <button id="verifyOtpBtn" type="button">驗證並進入表單</button>
        </div>

        <div class="msg" id="msgBox"></div>
      </div>
    </div>

    <div class="form-wrap hidden" id="formWrap">
      <iframe
        id="tallyFrame"
        src="https://tally.so/r/rjl742?transparentBackground=1&dynamicHeight=1"
        title="Tally Form"
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>
  </div>

  <div class="overlay" id="timeoutOverlay">
    <div class="overlay-box">
      <h2>填寫時間已到</h2>
      <p>本次表單使用時間為 15 分鐘，系統已停止顯示表單。</p>
      <p>如需重新使用，請重新完成驗證流程。</p>
    </div>
  </div>

  <script>
    const API_BASE = "https://tally-otp-worker.orangebabe20.workers.dev";
    const WARNING_SECONDS = 60;

    const STORAGE_KEYS = {
      email: "tally_email_v1",
      sessionId: "tally_session_id_v1",
      warned: "tally_warned_v1"
    };

    const authScreen = document.getElementById("authScreen");
    const formWrap = document.getElementById("formWrap");
    const timeoutOverlay = document.getElementById("timeoutOverlay");

    const emailInput = document.getElementById("emailInput");
    const otpInput = document.getElementById("otpInput");
    const sendOtpBtn = document.getElementById("sendOtpBtn");
    const verifyOtpBtn = document.getElementById("verifyOtpBtn");
    const msgBox = document.getElementById("msgBox");
    const countdownEl = document.getElementById("countdown");

    let statusTimer = null;

    function setMessage(text) {
      msgBox.textContent = text;
    }

    function setCountdown(seconds) {
      if (seconds < 0) seconds = 0;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      countdownEl.textContent =
        `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function lockForm() {
      formWrap.classList.add("hidden");
      timeoutOverlay.style.display = "flex";
      setCountdown(0);
      localStorage.removeItem(STORAGE_KEYS.sessionId);
      localStorage.removeItem(STORAGE_KEYS.warned);
    }

    function showForm() {
      authScreen.classList.add("hidden");
      formWrap.classList.remove("hidden");
      timeoutOverlay.style.display = "none";
    }

    function showAuth() {
      authScreen.classList.remove("hidden");
      formWrap.classList.add("hidden");
      timeoutOverlay.style.display = "none";
    }

    async function sendOtp() {
      const email = emailInput.value.trim();

      if (!email) {
        setMessage("請先輸入 Email。");
        return;
      }

      sendOtpBtn.disabled = true;
      setMessage("正在發送驗證碼...");

      try {
        const res = await fetch(`${API_BASE}/send-otp`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          setMessage(data.error || "發送失敗。");
          return;
        }

        localStorage.setItem(STORAGE_KEYS.email, email);

        setMessage(`驗證碼已建立。\n目前測試碼：${data.code}\n之後會改成寄到 Email。`);
      } catch (err) {
        setMessage("發送失敗，請稍後再試。");
      } finally {
        sendOtpBtn.disabled = false;
      }
    }

    async function verifyOtp() {
      const email = emailInput.value.trim();
      const code = otpInput.value.trim();

      if (!email || !code) {
        setMessage("請輸入 Email 和驗證碼。");
        return;
      }

      verifyOtpBtn.disabled = true;
      setMessage("正在驗證...");

      try {
        const res = await fetch(`${API_BASE}/verify-otp`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, code })
        });

        const data = await res.json();

        if (!res.ok) {
          setMessage(data.error || "驗證失敗。");
          return;
        }

        localStorage.setItem(STORAGE_KEYS.email, email);
        localStorage.setItem(STORAGE_KEYS.sessionId, data.sessionId);
        localStorage.setItem(STORAGE_KEYS.warned, "false");

        showForm();
        setCountdown(data.remainingSeconds);
        startSessionWatcher();
      } catch (err) {
        setMessage("驗證失敗，請稍後再試。");
      } finally {
        verifyOtpBtn.disabled = false;
      }
    }

    async function checkSessionStatus() {
      const sessionId = localStorage.getItem(STORAGE_KEYS.sessionId);

      if (!sessionId) {
        showAuth();
        setCountdown(0);
        return;
      }

      try {
        const res = await fetch(
          `${API_BASE}/session-status?sessionId=${encodeURIComponent(sessionId)}`
        );
        const data = await res.json();

        if (!res.ok) {
          lockForm();
          return;
        }

        if (!data.active) {
          lockForm();
          return;
        }

        setCountdown(data.remainingSeconds);
        showForm();

        const warned = localStorage.getItem(STORAGE_KEYS.warned) === "true";
        if (!warned && data.remainingSeconds <= WARNING_SECONDS) {
          localStorage.setItem(STORAGE_KEYS.warned, "true");
          alert("提醒：距離表單關閉只剩 1 分鐘。");
        }
      } catch (err) {
        setMessage("無法確認使用狀態，請稍後重試。");
      }
    }

    function startSessionWatcher() {
      if (statusTimer) {
        clearInterval(statusTimer);
      }

      checkSessionStatus();

      statusTimer = setInterval(() => {
        checkSessionStatus();
      }, 5000);
    }

    function restoreSessionIfAny() {
      const savedEmail = localStorage.getItem(STORAGE_KEYS.email);
      const sessionId = localStorage.getItem(STORAGE_KEYS.sessionId);

      if (savedEmail) {
        emailInput.value = savedEmail;
      }

      if (sessionId) {
        startSessionWatcher();
      } else {
        showAuth();
        setCountdown(0);
      }
    }

    sendOtpBtn.addEventListener("click", sendOtp);
    verifyOtpBtn.addEventListener("click", verifyOtp);

    restoreSessionIfAny();
  </script>
</body>
</html>
